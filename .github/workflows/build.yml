name: Build Multi-Platform

"on":
  push:
    branches: [ "master" ]
    paths:
      - "VERSION"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Show version
        shell: bash
        run: echo "Building version ${{ env.VERSION }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp version into constants.py
        shell: bash
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --collect-submodules datanodetools_app \
              --collect-all PyQt6 \
              --hidden-import keyring.backends.Windows \
              --hidden-import keyring.backends.fail \
              --hidden-import keyring.backends.null \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "DataNode Tools" \
              datanodetools.py
          else
            pyinstaller --onefile --noconsole \
              --collect-submodules datanodetools_app \
              --collect-all PyQt6 \
              --hidden-import keyring.backends.SecretService \
              --hidden-import keyring.backends.kwallet \
              --hidden-import keyring.backends.fail \
              --hidden-import keyring.backends.null \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "DataNode Tools" \
              datanodetools.py
          fi

      - name: Bundle Linux installer script (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p linux-installer
          cp "dist/DataNode Tools" linux-installer/DataNode-Tools-linux
          chmod +x linux-installer/DataNode-Tools-linux
          cp installer.sh linux-installer/installer.sh
          chmod +x linux-installer/installer.sh
          if [[ -f builditems/debian_ubuntu/icon.png ]]; then
            mkdir -p linux-installer/builditems/debian_ubuntu
            cp builditems/debian_ubuntu/icon.png linux-installer/builditems/debian_ubuntu/icon.png
          fi
          tar -czf "DataNodeTools-${{ env.VERSION }}-linux.tar.gz" -C linux-installer .

      - name: Build NSIS installer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          choco install nsis --no-progress -y

          if [[ ! -f installer.nsi ]]; then
            echo 'ERROR: installer.nsi not found in repo root.' && exit 1
          fi
          if [[ ! -f 'dist/DataNode Tools.exe' ]]; then
            echo 'ERROR: dist/DataNode Tools.exe not found.' && exit 1
          fi

          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' /DAPP_VERSION=${{ env.VERSION }} installer.nsi"

      - name: Upload Linux tarball (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian_ubuntu-tar-${{ env.VERSION }}
          path: DataNodeTools-${{ env.VERSION }}-linux.tar.gz

      - name: Rename portable exe (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # The raw PyInstaller output has no version in its name and would
          # collide across releases once attached to the GitHub release.
          # updater.py's _asset_name() looks for this exact pattern when the
          # app detects it's running as the portable (no-installer) build —
          # see _is_portable_windows() in updater.py.
          cp "dist/DataNode Tools.exe" "DataNodeTools-Portable-${{ env.VERSION }}.exe"

      - name: Upload portable exe (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ env.VERSION }}
          path: DataNodeTools-Portable-${{ env.VERSION }}.exe

      - name: Upload installer exe (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: DataNodeTools-Setup-*.exe

  # ──────────────────────────────────────────────
  # macOS arm64 (Apple Silicon — native)
  # ──────────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build arm64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules datanodetools_app \
            --collect-all PyQt6 \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --hidden-import keyring.backends.null \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.datanodetools \
            --target-arch arm64 \
            --name "DataNode Tools" \
            datanodetools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/DataNode Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "DataNode Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "DataNode Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "DataNodeTools-${{ env.VERSION }}-macOS-arm64.dmg" \
            "dist/DataNode Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "DataNode Tools" \
                -srcfolder "dist/DataNode Tools.app" \
                -ov -format UDZO \
                "DataNodeTools-${{ env.VERSION }}-macOS-arm64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-${{ env.VERSION }}
          path: DataNodeTools-*-macOS-arm64.dmg

  # ──────────────────────────────────────────────
  # macOS x86_64 (Intel — also runs via Rosetta)
  # ──────────────────────────────────────────────
  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-x86-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x86-pip-

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build x86_64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules datanodetools_app \
            --collect-all PyQt6 \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --hidden-import keyring.backends.null \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.datanodetools \
            --target-arch x86_64 \
            --name "DataNode Tools" \
            datanodetools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/DataNode Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "DataNode Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "DataNode Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "DataNodeTools-${{ env.VERSION }}-macOS-x86_64.dmg" \
            "dist/DataNode Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "DataNode Tools" \
                -srcfolder "dist/DataNode Tools.app" \
                -ov -format UDZO \
                "DataNodeTools-${{ env.VERSION }}-macOS-x86_64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-${{ env.VERSION }}
          path: DataNodeTools-*-macOS-x86_64.dmg

  # ──────────────────────────────────────────────
  # Draft release — collects all platform builds
  # ──────────────────────────────────────────────
  release:
    name: Create Draft Release
    needs: [build, build-macos-arm64, build-macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: debian_ubuntu-tar-${{ env.VERSION }}
          path: release-assets

      - name: Download Windows portable exe
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-${{ env.VERSION }}
          path: release-assets

      - name: Download Windows installer exe
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: release-assets

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-${{ env.VERSION }}
          path: release-assets

      - name: Download macos-x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-${{ env.VERSION }}
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }} -
          draft: true
          files: release-assets/*